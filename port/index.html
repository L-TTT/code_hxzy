<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和弦之约 - 原型图总览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ink-blue': '#0f1023',
                        'ink-blue-light': '#1a1a2e',
                        'warm-gold': '#C9A96E',
                        'warm-gold-light': '#d4b97a',
                        'cream': '#FFF8F0',
                        'rose-gold': '#B76E79',
                        'coral': '#FF6B6B',
                        'lavender': '#9B8EC1',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111827; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .page-wrapper {
            display: inline-block;
            margin: 24px;
            vertical-align: top;
        }
        .page-label {
            text-align: center;
            color: #C9A96E;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .phone-frame {
            width: 430px;
            height: 932px;
            border: 3px solid #333;
            border-radius: 44px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 0 2px #1a1a2e, 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
        }
        .phone-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 34px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }
        .phone-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .header-bar {
            background: linear-gradient(135deg, #0f1023, #1a1a2e);
            border-bottom: 1px solid rgba(201, 169, 110, 0.3);
        }
    </style>
</head>
<body class="min-h-screen">
    <header class="header-bar py-6 px-8 sticky top-0 z-50">
        <div class="max-w-[2200px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-warm-gold flex items-center justify-center">
                    <svg class="w-6 h-6 text-ink-blue" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                </div>
                <h1 class="text-warm-gold text-xl font-semibold tracking-widest">和弦之约 · 原型图总览</h1>
            </div>
            <p class="text-gray-500 text-sm">iPhone 16 Pro Max · 430 × 932</p>
        </div>
    </header>

    <main class="py-10 px-4 text-center" style="overflow-x: auto;">
        <div class="inline-flex flex-wrap justify-center gap-0">

            <div class="page-wrapper">
                <div class="page-label">封面页 COVER</div>
                <div class="phone-frame">
                    <iframe src="home-cover.html"></iframe>
                </div>
            </div>

            <div class="page-wrapper">
                <div class="page-label">乐谱内页 SCORE（生日事件）</div>
                <div class="phone-frame">
                    <iframe src="home-birthday.html"></iframe>
                </div>
            </div>

            <div class="page-wrapper">
                <div class="page-label">乐谱内页 SCORE（纪念日事件）</div>
                <div class="phone-frame">
                    <iframe src="home-anniversary.html"></iframe>
                </div>
            </div>

            <div class="page-wrapper">
                <div class="page-label">乐谱内页 SCORE（日常事件）</div>
                <div class="phone-frame">
                    <iframe src="home-daily.html"></iframe>
                </div>
            </div>

            <div class="page-wrapper">
                <div class="page-label">封底页 BACK COVER</div>
                <div class="phone-frame">
                    <iframe src="home-back.html"></iframe>
                </div>
            </div>

            <div class="page-wrapper">
                <div class="page-label">编辑管理页 EDIT</div>
                <div class="phone-frame">
                    <iframe src="mine.html"></iframe>
                </div>
            </div>

            <div class="page-wrapper">
                <div class="page-label">设置页 SETTINGS</div>
                <div class="phone-frame">
                    <iframe src="settings.html"></iframe>
                </div>
            </div>

        </div>
    </main>

    <footer class="text-center py-8 text-gray-600 text-sm border-t border-gray-800">
        <p>和弦之约 · 微信小程序原型图 · 2026</p>
    </footer>
</body>
</html>
