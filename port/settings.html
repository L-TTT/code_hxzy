<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ink': '#0f1023',
                        'ink-light': '#1a1a2e',
                        'ink-mid': '#252540',
                        'gold': '#C9A96E',
                        'gold-light': '#d4b97a',
                        'cream': '#FFF8F0',
                        'rose': '#B76E79',
                        'coral': '#FF6B6B',
                        'lavender': '#9B8EC1',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1023; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 430px; height: 932px; overflow: hidden; }
        .menu-item {
            background: rgba(26,26,46,0.6);
            border: 1px solid rgba(201,169,110,0.08);
            transition: all 0.2s;
        }
        .menu-item:hover { border-color: rgba(201,169,110,0.2); background: rgba(26,26,46,0.8); }
        .theme-card {
            border: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
        }
        .theme-card.active { border-color: #C9A96E; }
        .theme-card:hover { border-color: rgba(201,169,110,0.5); }
    </style>
</head>
<body>
    <div class="flex flex-col h-full">
        <div class="flex items-center justify-between px-4 pt-12 pb-3 bg-ink/80">

                    <div class="theme-card active rounded-xl overflow-hidden">
                        <div class="h-20 bg-gradient-to-br from-ink via-ink-light to-ink relative">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="w-8 h-6 border border-gold/40 rounded"></div>
                            </div>
                            <div class="absolute bottom-0 left-0 right-0 h-4 bg-gradient-to-t from-gold/10 to-transparent"></div>
                        </div>
                        <div class="py-2 text-center bg-ink-light/60">

                            </div>
