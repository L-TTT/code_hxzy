<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乐谱页 - 纪念日事件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ink': '#0f1023',
                        'ink-light': '#1a1a2e',
                        'gold': '#C9A96E',
                        'gold-light': '#d4b97a',
                        'cream': '#FFF8F0',
                        'rose': '#B76E79',
                        'coral': '#FF6B6B',
                        'lavender': '#9B8EC1',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1023; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 430px; height: 932px; overflow: hidden; }
        .staff-line { height: 1px; background: rgba(201,169,110,0.2); }
        .note-head { width: 14px; height: 10px; background: currentColor; border-radius: 50%; transform: rotate(-15deg); }
        .note-stem { width: 1.5px; height: 28px; background: currentColor; }
        .photo-card {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .photo-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid rgba(201,169,110,0.15);
            border-radius: 8px;
            pointer-events: none;
        }
        .heart-pulse {
            animation: heartPulse 2s ease-in-out infinite;
        }
        @keyframes heartPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .page-texture {
            background-image: 
                radial-gradient(ellipse at 50% 50%, rgba(183,110,121,0.02) 0%, transparent 70%);
        }
    </style>
</head>
<body class="page-texture relative">
    <div class="absolute inset-0 flex flex-col">
        <div class="flex items-center justify-between px-4 pt-12 pb-3 bg-ink/60">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-lg bg-gold flex items-center justify-center">
                    <svg class="w-4 h-4 text-ink" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
                <span class="text-gold text-sm font-semibold tracking-wider" style="font-family: Georgia, serif;">和弦之约</span>
            </div>
            <button class="p-2 text-gold/50">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </div>

        <div class="flex-1 relative overflow-hidden px-4 pt-3">
            <div class="absolute top-6 left-4 right-4 flex flex-col gap-[11px] opacity-30">
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="mt-5 staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
                <div class="staff-line"></div>
            </div>

            <div class="relative z-10 pt-4">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-1 h-8 bg-rose rounded-full"></div>
                    <h2 class="text-cream text-xl font-bold tracking-wide" style="font-family: Georgia, serif;">一周年纪 · 携手</h2>
                </div>
                <div class="flex items-center gap-3 ml-3 mb-4">
                    <span class="text-gold/60 text-xs tracking-widest" style="font-family: Georgia, serif;">♩ = 60 BPM</span>
                    <span class="text-cream/30">|</span>
                    <span class="text-rose/80 text-xs">💕 纪念日</span>
                    <span class="text-cream/30">|</span>
                    <span class="text-gold/60 text-xs">Day 365</span>
                </div>

                <div class="flex gap-3 mb-5">
                    <div class="photo-card flex-1 h-36 relative">
                        <div class="w-full h-full bg-gradient-to-br from-rose/20 to-lavender/30 flex items-center justify-center">
                            <div class="text-center">
                                <div class="heart-pulse inline-block">
                                    <span class="text-3xl">💕</span>
                                </div>
                                <span class="text-cream/40 text-xs block mt-1">合照</span>
                            </div>
                        </div>
                    </div>
                    <div class="photo-card w-28 h-36 relative">
                        <div class="w-full h-full bg-gradient-to-br from-gold/20 to-rose/20 flex items-center justify-center">
                            <div class="text-center">
                                <span class="text-2xl">🌹</span>
                                <span class="text-cream/40 text-xs block mt-1">纪念礼物</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3 mb-5">
                    <div class="photo-card flex-1 h-28 relative">
                        <div class="w-full h-full bg-gradient-to-br from-lavender/20 to-gold/20 flex items-center justify-center">
                            <div class="text-center">
                                <span class="text-2xl">🍽️</span>
                                <span class="text-cream/40 text-xs block mt-1">纪念晚餐</span>
                            </div>
                        </div>
                    </div>
                    <div class="photo-card flex-1 h-28 relative">
                        <div class="w-full h-full bg-gradient-to-br from-rose/20 to-coral/20 flex items-center justify-center">
                            <div class="text-center">
                                <span class="text-2xl">✉️</span>
                                <span class="text-cream/40 text-xs block mt-1">手写信</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex items-start gap-2 mb-5">
                    <div class="flex flex-col items-center mt-2 gap-1">
                        <div class="heart-pulse">
                            <div class="note-head text-rose"></div>
                            <div class="note-stem bg-rose ml-[11px]"></div>
                        </div>
                        <svg class="w-3 h-3 text-rose" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    </div>
                    <div class="flex-1 bg-ink-light/60 border border-gold/10 rounded-lg p-3 backdrop-blur-sm">
                        <p class="text-cream/80 text-sm leading-relaxed">不知不觉已经在一起整整一年了。365天，每一天都因为有你而闪闪发光。谢谢你包容我的小脾气，陪我走过春夏秋冬。未来的每一个365天，都想和你一起度过。</p>
                    </div>
                </div>

                <div class="flex items-center justify-between px-2 py-3 bg-ink-light/40 rounded-lg border border-gold/10">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-rose" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                        <span class="text-cream/60 text-xs">告白气球</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-24 h-1 bg-gold/20 rounded-full overflow-hidden">
                            <div class="w-2/3 h-full bg-rose rounded-full"></div>
                        </div>
                        <svg class="w-5 h-5 text-rose" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
            </div>

            <div class="absolute top-0 right-2 bottom-0 flex flex-col items-center justify-center gap-1 opacity-20">
                <svg class="w-3 h-3 text-rose" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <div class="w-[1px] h-6 bg-rose/30"></div>
                <span class="text-rose text-lg">♪</span>
                <div class="w-[1px] h-8 bg-rose/30"></div>
                <svg class="w-3 h-3 text-rose" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <div class="w-[1px] h-4 bg-rose/30"></div>
                <span class="text-rose text-lg">♫</span>
            </div>
        </div>

        <div class="flex items-center justify-between px-4 py-3 bg-ink/80 border-t border-gold/10">
            <button class="p-2 text-gold/40">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
            </button>
            <div class="flex items-center gap-2">
                <span class="text-gold/30 text-sm">1</span>
                <span class="text-gold/30 text-xs">/</span>
                <span class="text-gold text-sm font-medium">3</span>
            </div>
            <div class="flex items-center gap-1">
                <button class="p-2 text-gold/40">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z"/></svg>
                </button>
                <button class="p-2 text-gold/40">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                </button>
                <button class="p-2 text-gold/40">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
